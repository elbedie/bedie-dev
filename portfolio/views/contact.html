<div class="content" style="display:block">
  <div class="toolbar"><button>Arquivo</button><button>Editar</button><button>Formatar</button><button>Exibir</button><button>Ajuda</button></div>
  <section class="main">
    <div class="success" ng-if="vm.sent">
      <div class="success-icon">✓</div>
      <h2>Mensagem registrada</h2>
      <p class="meta">Este formulário é visual. Para contato real, use e-mail ou LinkedIn.</p>
    </div>
    <div ng-if="!vm.sent">
      <h2 style="font-family:'Pixelify Sans',sans-serif;margin-top:0">Contato</h2>
      <p class="meta">Entre em contato diretamente ou preencha o formulário visual abaixo.</p>
      <div class="contact-card">
        <p>Email: <a href="mailto:diego.ddvid@gmail.com">diego.ddvid@gmail.com</a></p>
        <p>LinkedIn: <a href="https://www.linkedin.com/in/diego-david-600608199/" target="_blank">linkedin.com/in/diego-david-600608199</a></p>
      </div>
      <form class="contact-form" ng-submit="vm.sendMessage()">
        <label>Nome</label><input ng-model="vm.form.name" placeholder="Seu nome">
        <label>Email</label><input type="email" ng-model="vm.form.email" placeholder="seu@email.com">
        <label>Mensagem</label><textarea ng-model="vm.form.message" placeholder="Escreva sua mensagem aqui..."></textarea>
        <div><button class="primary" type="submit">Enviar</button> <button class="secondary" type="button" ng-click="vm.clearForm()">Limpar</button></div>
      </form>
    </div>
  </section>
</div>
